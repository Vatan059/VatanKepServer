<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>VatanKepServer - Gecmis</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --baseline: #c3c2b7;
    --series: #2a78d6;
    --border: rgba(11,11,11,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --gridline: #2c2c2a;
      --baseline: #383835;
      --series: #3987e5;
      --border: rgba(255,255,255,0.10);
    }
  }

  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--text-primary); margin: 0; padding: 24px; }
  a { color: var(--series); }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .controls { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  select { font: inherit; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); }
  .range-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .range-group button { font: inherit; padding: 6px 12px; border: none; background: var(--surface); color: var(--text-secondary); cursor: pointer; }
  .range-group button.active { background: var(--series); color: #fff; }
  .charts { display: flex; flex-direction: column; gap: 20px; max-width: 760px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .chart-empty { color: var(--text-muted); font-size: 13px; }
  svg { width: 100%; height: 160px; overflow: visible; display: block; }
  .line { fill: none; stroke: var(--series); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .end-dot { fill: var(--series); stroke: var(--surface); stroke-width: 2; }
  .gridline { stroke: var(--gridline); stroke-width: 1; }
  .axis-label { fill: var(--text-muted); font-size: 11px; }
  .crosshair { stroke: var(--baseline); stroke-width: 1; }
  .tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text-primary); pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); white-space: nowrap; }
  .hover-layer { fill: transparent; }
</style>
</head>
<body>
  <a href="/">&larr; Canli tabloya don</a>
  <h1>Gecmis Trend</h1>
  <div class="controls">
    <select id="machineSelect"></select>
    <div class="range-group" id="rangeGroup">
      <button data-hours="1" class="active">Son 1 saat</button>
      <button data-hours="6">Son 6 saat</button>
      <button data-hours="24">Son 24 saat</button>
      <button data-hours="0">Tumu</button>
    </div>
  </div>
  <div class="charts" id="charts"></div>

<script>
let currentHours = 1;
let tagsByMachine = {};

async function loadMachines() {
  const res = await fetch("/api/groups");
  const groups = await res.json();

  const select = document.getElementById("machineSelect");
  select.innerHTML = "";
  for (const group of groups) {
    if (group.machines.length === 0) continue;
    const optgroup = document.createElement("optgroup");
    optgroup.label = group.label;
    for (const machine of group.machines) {
      tagsByMachine[machine.id] = machine.tags;
      const option = document.createElement("option");
      option.value = machine.id;
      option.textContent = machine.id;
      optgroup.appendChild(option);
    }
    select.appendChild(optgroup);
  }

  const params = new URLSearchParams(location.search);
  if (params.get("machine") && tagsByMachine[params.get("machine")]) {
    select.value = params.get("machine");
  }
  select.addEventListener("change", renderAll);
}

function buildPath(points, x, y) {
  return points.map((p, i) => `${i === 0 ? "M" : "L"}${x(p.recorded_at)},${y(p.value)}`).join(" ");
}

function renderChart(container, label, points) {
  const card = document.createElement("div");
  card.className = "chart-card";
  const title = document.createElement("div");
  title.className = "chart-title";
  title.textContent = label;
  card.appendChild(title);

  const valid = points.filter((p) => p.value !== null && p.value !== undefined);
  if (valid.length < 2) {
    const empty = document.createElement("div");
    empty.className = "chart-empty";
    empty.textContent = "Yeterli veri yok.";
    card.appendChild(empty);
    container.appendChild(card);
    return;
  }

  const width = 700, height = 160, padL = 44, padR = 10, padT = 10, padB = 20;
  const minT = valid[0].recorded_at, maxT = valid[valid.length - 1].recorded_at;
  const values = valid.map((p) => p.value);
  let minV = Math.min(...values), maxV = Math.max(...values);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  const pad = (maxV - minV) * 0.1;
  minV -= pad; maxV += pad;

  const x = (t) => padL + ((t - minT) / (maxT - minT || 1)) * (width - padL - padR);
  const y = (v) => padT + (1 - (v - minV) / (maxV - minV)) * (height - padT - padB);

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

  [minV, (minV + maxV) / 2, maxV].forEach((v) => {
    const ly = y(v);
    const line = document.createElementNS(svgNS, "line");
    line.setAttribute("x1", padL); line.setAttribute("x2", width - padR);
    line.setAttribute("y1", ly); line.setAttribute("y2", ly);
    line.setAttribute("class", "gridline");
    svg.appendChild(line);

    const text = document.createElementNS(svgNS, "text");
    text.setAttribute("x", padL - 6); text.setAttribute("y", ly + 3);
    text.setAttribute("text-anchor", "end");
    text.setAttribute("class", "axis-label");
    text.textContent = v.toFixed(1);
    svg.appendChild(text);
  });

  const path = document.createElementNS(svgNS, "path");
  path.setAttribute("d", buildPath(valid, x, y));
  path.setAttribute("class", "line");
  svg.appendChild(path);

  const last = valid[valid.length - 1];
  const dot = document.createElementNS(svgNS, "circle");
  dot.setAttribute("cx", x(last.recorded_at)); dot.setAttribute("cy", y(last.value));
  dot.setAttribute("r", 4);
  dot.setAttribute("class", "end-dot");
  svg.appendChild(dot);

  const crosshair = document.createElementNS(svgNS, "line");
  crosshair.setAttribute("y1", padT); crosshair.setAttribute("y2", height - padB);
  crosshair.setAttribute("class", "crosshair");
  crosshair.style.display = "none";
  svg.appendChild(crosshair);

  const hoverRect = document.createElementNS(svgNS, "rect");
  hoverRect.setAttribute("x", padL); hoverRect.setAttribute("y", padT);
  hoverRect.setAttribute("width", width - padL - padR); hoverRect.setAttribute("height", height - padT - padB);
  hoverRect.setAttribute("class", "hover-layer");
  svg.appendChild(hoverRect);

  const tooltip = document.createElement("div");
  tooltip.className = "tooltip";
  tooltip.style.display = "none";
  card.style.position = "relative";

  hoverRect.addEventListener("mousemove", (e) => {
    const rect = svg.getBoundingClientRect();
    const relX = ((e.clientX - rect.left) / rect.width) * width;
    const t = minT + ((relX - padL) / (width - padL - padR)) * (maxT - minT);
    let nearest = valid[0];
    for (const p of valid) {
      if (Math.abs(p.recorded_at - t) < Math.abs(nearest.recorded_at - t)) nearest = p;
    }
    crosshair.setAttribute("x1", x(nearest.recorded_at));
    crosshair.setAttribute("x2", x(nearest.recorded_at));
    crosshair.style.display = "block";

    tooltip.style.display = "block";
    tooltip.textContent = `${nearest.value.toFixed(2)} — ${new Date(nearest.recorded_at).toLocaleTimeString("tr-TR")}`;
    tooltip.style.left = (e.clientX - rect.left + 12) + "px";
    tooltip.style.top = (e.clientY - rect.top - 30) + "px";
  });
  hoverRect.addEventListener("mouseleave", () => {
    crosshair.style.display = "none";
    tooltip.style.display = "none";
  });

  card.appendChild(svg);
  card.appendChild(tooltip);
  container.appendChild(card);
}

async function renderAll() {
  const machine = document.getElementById("machineSelect").value;
  const container = document.getElementById("charts");
  container.innerHTML = "";
  if (!machine) return;

  const tags = tagsByMachine[machine] || [];
  for (const tag of tags) {
    const res = await fetch(`/api/history?machineId=${encodeURIComponent(machine)}&tagLabel=${encodeURIComponent(tag)}&hours=${currentHours}`);
    const points = await res.json();
    if (points.length === 0) continue;
    renderChart(container, `${machine}.${tag}`, points);
  }

  if (container.children.length === 0) {
    container.innerHTML = '<div class="chart-empty">Bu makine icin henuz veri yok.</div>';
  }
}

document.getElementById("rangeGroup").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#rangeGroup button").forEach((b) => b.classList.remove("active"));
  e.target.classList.add("active");
  currentHours = Number(e.target.dataset.hours);
  renderAll();
});

loadMachines().then(renderAll);
</script>
</body>
</html>
