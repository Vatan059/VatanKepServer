<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VatanKepServer - Gecmis</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --gridline: #e1e0d9;
    --baseline: #c3c2b7;
    --series: #2a78d6;
    --border: rgba(11,11,11,0.10);
    --header-bg: rgba(252,252,251,0.85);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --gridline: #2c2c2a;
      --baseline: #383835;
      --series: #3987e5;
      --border: rgba(255,255,255,0.10);
      --header-bg: rgba(26,26,25,0.85);
    }
  }

  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--text-primary); margin: 0; -webkit-tap-highlight-color: transparent; }
  a { color: var(--series); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { position: sticky; top: 0; z-index: 10; background: var(--header-bg); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px 16px; }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand img { height: 30px; width: auto; display: block; }
  header h1 { font-size: 17px; margin: 0; }
  nav { display: flex; align-items: center; gap: 14px; font-size: 13px; flex-wrap: wrap; }

  .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(55vw, 820px); opacity: 0.05; z-index: -1; pointer-events: none; user-select: none; }

  main { max-width: 1400px; margin: 0 auto; padding: 16px 24px 40px; }

  .controls { display: flex; gap: 16px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  select { font: inherit; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); min-height: 40px; }
  .range-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .range-group button { font: inherit; padding: 8px 12px; min-height: 40px; border: none; background: var(--surface); color: var(--text-secondary); cursor: pointer; }
  .range-group button.active { background: var(--series); color: #fff; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; align-items: start; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
  .chart-empty { color: var(--text-muted); font-size: 13px; }
  svg { width: 100%; height: 160px; overflow: visible; display: block; }
  .line { fill: none; stroke: var(--series); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .end-dot { fill: var(--series); stroke: var(--surface); stroke-width: 2; }
  .gridline { stroke: var(--gridline); stroke-width: 1; }
  .axis-label { fill: var(--text-muted); font-size: 11px; }
  .crosshair { stroke: var(--baseline); stroke-width: 1; }
  .tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; color: var(--text-primary); pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); white-space: nowrap; }
  .hover-layer { fill: transparent; }

  @media (max-width: 480px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 15px; width: 100%; }
    main { padding: 12px 12px 32px; }
    select { flex: 1 1 100%; }
    .range-group { flex: 1 1 100%; }
    .range-group button { flex: 1; }
  }
</style>
</head>
<body>
  <img class="watermark" src="/logo.png" alt="" />
  <header>
    <div class="brand">
      <img src="/logo.png" alt="Vatan Kablo" />
      <h1>Gecmis Trend</h1>
    </div>
    <nav>
      <a href="/">Canli tablo</a>
      <a href="/history-groups.html">Gruplu gecmis</a>
    </nav>
  </header>
  <main>
    <div class="controls">
      <select id="machineSelect"></select>
      <div class="range-group" id="rangeGroup">
        <button data-hours="1" class="active">Son 1 saat</button>
        <button data-hours="6">Son 6 saat</button>
        <button data-hours="24">Son 24 saat</button>
        <button data-hours="0">Tumu</button>
      </div>
    </div>
    <div class="charts" id="charts"></div>
  </main>

<script src="/chart.js"></script>
<script>
let currentHours = 1;
let tagsByMachine = {};

async function loadMachines() {
  const res = await fetch("/api/groups");
  const groups = await res.json();

  const select = document.getElementById("machineSelect");
  select.innerHTML = "";
  for (const group of groups) {
    if (group.machines.length === 0) continue;
    const optgroup = document.createElement("optgroup");
    optgroup.label = group.label;
    for (const machine of group.machines) {
      tagsByMachine[machine.id] = machine.tags;
      const option = document.createElement("option");
      option.value = machine.id;
      option.textContent = machine.id;
      optgroup.appendChild(option);
    }
    select.appendChild(optgroup);
  }

  const params = new URLSearchParams(location.search);
  if (params.get("machine") && tagsByMachine[params.get("machine")]) {
    select.value = params.get("machine");
  }
  select.addEventListener("change", renderAll);
}

async function renderAll() {
  const machine = document.getElementById("machineSelect").value;
  const container = document.getElementById("charts");
  container.innerHTML = "";
  if (!machine) return;

  const tags = tagsByMachine[machine] || [];
  for (const tag of tags) {
    const res = await fetch(`/api/history?machineId=${encodeURIComponent(machine)}&tagLabel=${encodeURIComponent(tag)}&hours=${currentHours}`);
    const points = await res.json();
    if (points.length === 0) continue;
    renderTrendChart(container, `${machine}.${tag}`, points);
  }

  if (container.children.length === 0) {
    container.innerHTML = '<div class="chart-empty">Bu makine icin henuz veri yok.</div>';
  }
}

document.getElementById("rangeGroup").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  document.querySelectorAll("#rangeGroup button").forEach((b) => b.classList.remove("active"));
  e.target.classList.add("active");
  currentHours = Number(e.target.dataset.hours);
  renderAll();
});

loadMachines().then(renderAll);
</script>
</body>
</html>
