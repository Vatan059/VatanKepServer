<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VatanKepServer - Canli Izleme</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --series: #2a78d6;
    --header-bg: rgba(252,252,251,0.85);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255,255,255,0.10);
      --series: #3987e5;
      --header-bg: rgba(26,26,25,0.85);
    }
  }

  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--text-primary); margin: 0; -webkit-tap-highlight-color: transparent; }
  a { color: var(--series); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { position: sticky; top: 0; z-index: 10; background: var(--header-bg); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px 16px; }
  header h1 { font-size: 17px; margin: 0; }
  nav { display: flex; align-items: center; gap: 14px; font-size: 13px; flex-wrap: wrap; }
  #status { color: var(--text-muted); font-size: 12px; }
  .filter-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .filter-toggle input { width: 16px; height: 16px; }
  .hidden-by-filter { display: none !important; }

  main { max-width: 1100px; margin: 0 auto; padding: 16px 20px 40px; }

  details.group { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; }
  details.group summary { cursor: pointer; padding: 14px 16px; min-height: 24px; font-size: 15px; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 8px; user-select: none; }
  details.group summary::-webkit-details-marker { display: none; }
  details.group summary::before { content: "▸"; color: var(--text-muted); transition: transform 0.15s; display: inline-block; }
  details.group[open] summary::before { transform: rotate(90deg); }
  .group-count { color: var(--text-muted); font-weight: 400; font-size: 13px; }
  .group-body { padding: 4px 14px 14px; display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .group-empty { padding: 0 16px 16px; color: var(--text-muted); font-size: 13px; }

  .machine-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; background: color-mix(in srgb, var(--surface) 96%, var(--text-primary) 4%); }
  .machine-card h3 { margin: 0 0 6px; font-size: 14px; display: flex; justify-content: space-between; align-items: baseline; }
  .machine-card h3 a { font-size: 12px; font-weight: 400; }
  .tag-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .tag-row .label { color: var(--text-secondary); }
  .tag-row .value { font-variant-numeric: tabular-nums; font-weight: 500; }
  .stale { color: var(--text-muted); }
  .stale .value { font-weight: 400; }

  @media (max-width: 480px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 15px; width: 100%; }
    main { padding: 12px 12px 32px; }
    .group-body { grid-template-columns: 1fr; padding: 4px 10px 12px; }
    details.group summary { padding: 14px; font-size: 14px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Vatan Kablo — Canli Izleme</h1>
    <nav>
      <label class="filter-toggle"><input type="checkbox" id="onlyWithTags" checked /> Sadece tag tanimli olanlar</label>
      <a href="/history-groups.html">Gruplu gecmis</a>
      <a href="/history.html">Tek makine gecmisi</a>
      <span id="status">Yukleniyor...</span>
    </nav>
  </header>
  <main>
    <div id="groups"></div>
  </main>

<script>
// valueCells: "machineId::tagLabel" -> <span class="value"> elemani
// rowsByMachine: machineId -> her tag-row <div> elemani (stale renklendirme icin)
// cardByMachine / groupInfo: filtreleme (calisiyor/calismiyor) icin DOM referanslari
const valueCells = {};
const rowsByMachine = {};
const cardByMachine = {};
const groupInfo = {}; // groupId -> { countSpan, totalCount, machineIds: [] }
const hasTagsState = {}; // machineId -> bool (tag tanimli mi - statik, canli veriye bagli degil)

function fmt(value) {
  if (value === null || value === undefined) return "-";
  const n = Number(value);
  return Number.isFinite(n) ? n.toFixed(2) : String(value);
}

// DOM'u bir kere kurar. Sonraki refresh()'ler sadece deger/stale gunceller,
// <details> acik/kapali durumuna hic dokunmaz (kullanicinin kapattigi grup
// tekrar kendiliginden acilmasin diye).
function buildStructure(groupDefs) {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for (const group of groupDefs) {
    const details = document.createElement("details");
    details.className = "group";
    details.open = group.machines.length > 0;

    const summary = document.createElement("summary");
    const countSpan = document.createElement("span");
    countSpan.className = "group-count";
    countSpan.textContent = `(${group.machines.length} makine)`;
    summary.textContent = group.label + " ";
    summary.appendChild(countSpan);
    details.appendChild(summary);

    groupInfo[group.id] = { details, countSpan, totalCount: group.machines.length, machineIds: group.machines.map((m) => m.id) };

    if (group.machines.length === 0) {
      const empty = document.createElement("div");
      empty.className = "group-empty";
      empty.textContent = "Henuz makine eklenmedi.";
      details.appendChild(empty);
    } else {
      const body = document.createElement("div");
      body.className = "group-body";

      for (const machine of group.machines) {
        const card = document.createElement("div");
        card.className = "machine-card";
        card.innerHTML = `<h3>${machine.id} <a href="/history.html?machine=${encodeURIComponent(machine.id)}">Gecmis</a></h3>`;
        cardByMachine[machine.id] = card;
        hasTagsState[machine.id] = machine.tags.length > 0;

        if (machine.tags.length === 0) {
          const empty = document.createElement("div");
          empty.className = "group-empty";
          empty.style.padding = "0";
          empty.textContent = "Tag tanimlanmadi.";
          card.appendChild(empty);
        } else {
          rowsByMachine[machine.id] = [];
          for (const label of machine.tags) {
            const row = document.createElement("div");
            row.className = "tag-row";
            row.innerHTML = `<span class="label">${label}</span><span class="value">-</span>`;
            card.appendChild(row);
            valueCells[`${machine.id}::${label}`] = row.querySelector(".value");
            rowsByMachine[machine.id].push(row);
          }
        }
        body.appendChild(card);
      }
      details.appendChild(body);
    }

    container.appendChild(details);
  }
}

// "Sadece tag tanimli olanlar" filtresi: statik bir kritere gore (machines.ts'te
// tag tanimlanmis mi) calisir - canli veri tazeligine BAKMAZ, boylece ara ara
// veri gelen makineler filtre acikken yanip sonmez (flicker etmez).
function applyFilter() {
  const onlyWithTags = document.getElementById("onlyWithTags").checked;

  for (const [groupId, info] of Object.entries(groupInfo)) {
    let visibleCount = 0;
    for (const machineId of info.machineIds) {
      const card = cardByMachine[machineId];
      const hide = onlyWithTags && !hasTagsState[machineId];
      card.classList.toggle("hidden-by-filter", hide);
      if (!hide) visibleCount++;
    }
    info.countSpan.textContent = onlyWithTags
      ? `(${visibleCount}/${info.totalCount} tag tanimli)`
      : `(${info.totalCount} makine)`;
    info.details.classList.toggle("hidden-by-filter", onlyWithTags && info.totalCount > 0 && visibleCount === 0);
  }
}

async function loadGroups() {
  const res = await fetch("/api/groups");
  buildStructure(await res.json());
}

async function refresh() {
  try {
    const res = await fetch("/api/latest");
    const rows = await res.json();

    const latestByMachine = {};
    for (const r of rows) {
      const cell = valueCells[`${r.machine_id}::${r.tag_label}`];
      if (cell) cell.textContent = fmt(r.value);
      latestByMachine[r.machine_id] = Math.max(latestByMachine[r.machine_id] || 0, r.recorded_at);
    }

    const now = Date.now();
    for (const [machineId, rows2] of Object.entries(rowsByMachine)) {
      const newest = latestByMachine[machineId];
      const stale = newest && now - newest > 5000;
      for (const row of rows2) row.classList.toggle("stale", !!stale);
    }

    document.getElementById("status").textContent = "Son yenileme: " + new Date().toLocaleTimeString("tr-TR");
  } catch (err) {
    document.getElementById("status").textContent = "Baglanti hatasi: " + err;
  }
}

document.getElementById("onlyWithTags").addEventListener("change", applyFilter);

loadGroups().then(() => {
  applyFilter();
  refresh();
  setInterval(refresh, 2000);
});
</script>
</body>
</html>
