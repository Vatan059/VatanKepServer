<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>VatanKepServer - Ekstruder Izleme</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --surface: #fcfcfb;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --series: #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --surface: #1a1a19;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255,255,255,0.10);
      --series: #3987e5;
    }
  }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page); color: var(--text-primary); margin: 0; padding: 24px; }
  a { color: var(--series); }
  h1 { font-size: 20px; margin: 0 0 4px; }
  #status { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

  details.group { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; }
  details.group summary { cursor: pointer; padding: 12px 16px; font-size: 15px; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 8px; }
  details.group summary::-webkit-details-marker { display: none; }
  details.group summary::before { content: "▸"; color: var(--text-muted); transition: transform 0.15s; }
  details.group[open] summary::before { transform: rotate(90deg); }
  .group-count { color: var(--text-muted); font-weight: 400; font-size: 13px; }
  .group-body { padding: 4px 16px 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .group-empty { padding: 0 16px 16px; color: var(--text-muted); font-size: 13px; }

  .machine-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .machine-card h3 { margin: 0 0 6px; font-size: 14px; display: flex; justify-content: space-between; align-items: baseline; }
  .machine-card h3 a { font-size: 12px; font-weight: 400; }
  .tag-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .tag-row .label { color: var(--text-secondary); }
  .tag-row .value { font-variant-numeric: tabular-nums; }
  .stale { color: var(--text-muted); }
</style>
</head>
<body>
  <h1>Vatan Kablo — Canli Izleme</h1>
  <div style="margin-bottom: 8px;"><a href="/history-groups.html">Gruplu gecmis gorunumu &rarr;</a></div>
  <div id="status">Yukleniyor...</div>
  <div id="groups"></div>

<script>
// valueCells: "machineId::tagLabel" -> <span class="value"> elemani
// rowsByMachine: machineId -> her tag-row <div> elemani (stale renklendirme icin)
const valueCells = {};
const rowsByMachine = {};

function fmt(value) {
  if (value === null || value === undefined) return "-";
  const n = Number(value);
  return Number.isFinite(n) ? n.toFixed(2) : String(value);
}

// DOM'u bir kere kurar. Sonraki refresh()'ler sadece deger/stale gunceller,
// <details> acik/kapali durumuna hic dokunmaz (kullanicinin kapattigi grup
// tekrar kendiliginden acilmasin diye).
function buildStructure(groupDefs) {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for (const group of groupDefs) {
    const details = document.createElement("details");
    details.className = "group";
    details.open = group.machines.length > 0;

    const summary = document.createElement("summary");
    summary.innerHTML = `${group.label} <span class="group-count">(${group.machines.length} makine)</span>`;
    details.appendChild(summary);

    if (group.machines.length === 0) {
      const empty = document.createElement("div");
      empty.className = "group-empty";
      empty.textContent = "Henuz makine eklenmedi.";
      details.appendChild(empty);
    } else {
      const body = document.createElement("div");
      body.className = "group-body";

      for (const machine of group.machines) {
        const card = document.createElement("div");
        card.className = "machine-card";
        card.innerHTML = `<h3>${machine.id} <a href="/history.html?machine=${encodeURIComponent(machine.id)}">Gecmis</a></h3>`;

        if (machine.tags.length === 0) {
          const empty = document.createElement("div");
          empty.className = "group-empty";
          empty.style.padding = "0";
          empty.textContent = "Tag tanimlanmadi.";
          card.appendChild(empty);
        } else {
          rowsByMachine[machine.id] = [];
          for (const label of machine.tags) {
            const row = document.createElement("div");
            row.className = "tag-row";
            row.innerHTML = `<span class="label">${label}</span><span class="value">-</span>`;
            card.appendChild(row);
            valueCells[`${machine.id}::${label}`] = row.querySelector(".value");
            rowsByMachine[machine.id].push(row);
          }
        }
        body.appendChild(card);
      }
      details.appendChild(body);
    }

    container.appendChild(details);
  }
}

async function loadGroups() {
  const res = await fetch("/api/groups");
  buildStructure(await res.json());
}

async function refresh() {
  try {
    const res = await fetch("/api/latest");
    const rows = await res.json();

    const latestByMachine = {};
    for (const r of rows) {
      const cell = valueCells[`${r.machine_id}::${r.tag_label}`];
      if (cell) cell.textContent = fmt(r.value);
      latestByMachine[r.machine_id] = Math.max(latestByMachine[r.machine_id] || 0, r.recorded_at);
    }

    const now = Date.now();
    for (const [machineId, rows2] of Object.entries(rowsByMachine)) {
      const newest = latestByMachine[machineId];
      const stale = newest && now - newest > 5000;
      for (const row of rows2) row.classList.toggle("stale", !!stale);
    }

    document.getElementById("status").textContent = "Son yenileme: " + new Date().toLocaleTimeString("tr-TR");
  } catch (err) {
    document.getElementById("status").textContent = "Baglanti hatasi: " + err;
  }
}

loadGroups().then(() => {
  refresh();
  setInterval(refresh, 2000);
});
</script>
</body>
</html>
